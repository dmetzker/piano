<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <h1>hello!!</h1>
    <div class="keyboard">
        <div class="whiteKeys" id="c">
            <div class="whiteNote">C</div>
        </div>
        <div class="blackKeys" id="c#">
            <div class="blackNote">C#</div>
        </div>
        <div class="whiteKeys" id="d">
            <div class="whiteNote">D</div>
        </div>
        <div class="blackKeys" id="d#">
            <div class="blackNote">D#</div>
        </div>
        <div class="whiteKeys" id="e">
            <div class="whiteNote">E</div>
        </div>
    </div>

</body>
</html>
