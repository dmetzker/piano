<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <h1>Piano Keys!</h1>
    <a href="ada.html" id="ada">Ada</a>
    <button></button>
    <div class="keyboard">
        <div class="whiteKey" id="c">
            <p class="keyNote">C</p>
            <div class="blackKey" id="c-sharp"></div>
        </div>

        <div class="whiteKey" id="d">
            <div class="blackKey" id="d-sharp"></div>
        </div>

        <div class="whiteKey" id="e">
        </div>
        <div class="whiteKey" id="f">
            <p class="keyNote">F</p>
            <div class="blackKey" id="f-sharp"></div>
        </div>
         <div class="whiteKey" id="g">
            <div class="blackKey" id="g-sharp"></div>
        </div>
         <div class="whiteKey" id="a">
            <div class="blackKey" id="a-sharp"></div>
        </div>
        <div class="whiteKey" id="b">
        </div>
        <div class="whiteKey" id="y">
        </div>

    </div>
<script src="script.js"></script>
</body>
</html>
